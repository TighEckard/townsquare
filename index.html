<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Town Square">
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.svg">
<title>Town Square</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root{--bg:#0e0f13;--card:#181b21;--card2:#20242d;--bd:#2a2e38;--tx:#f2f3f5;--mut:#98a0ac;--ac:#818cf8;--ac2:#a5b4fc;--acsoft:#282a4d;--sat:1.4}
[data-theme="light"]{--bg:#f2f3f6;--card:#ffffff;--card2:#f4f6f9;--bd:#e5e8ec;--tx:#111418;--mut:#68707c;--ac:#5b63e6;--ac2:#4f46e5;--acsoft:#eceeff}
*{box-sizing:border-box}
html,body{overscroll-behavior-y:none}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx);-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:0;height:0}
.appbar{position:sticky;top:0;z-index:30;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;padding:calc(env(safe-area-inset-top,0px) + 14px) 18px 12px;background:var(--bg);background:color-mix(in srgb,var(--bg) 80%,transparent);-webkit-backdrop-filter:blur(20px) saturate(var(--sat));backdrop-filter:blur(20px) saturate(var(--sat));border-bottom:1px solid color-mix(in srgb,var(--bd) 55%,transparent)}
.appbar .brand{display:flex;flex-direction:column;gap:2px;min-width:0}
.appbar h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin:0;display:flex;align-items:center}
.appbar .sub{color:var(--mut);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdrbtns{display:flex;gap:8px;flex-shrink:0}
.wrap{max-width:620px;margin:0 auto;padding:16px 18px calc(92px + env(safe-area-inset-bottom,0px))}
.btn{background:var(--ac);color:#fff;border:0;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;transition:transform .1s,opacity .12s}
.btn.sec{background:var(--card2);color:var(--tx);border:1px solid var(--bd);font-weight:500}
.btn.gho{background:transparent;color:var(--mut);border:1px solid var(--bd);font-weight:500}
.btn.icon{height:42px;min-width:42px;padding:0 12px;display:inline-flex;align-items:center;justify-content:center;gap:6px;font-size:15px;background:var(--card);color:var(--tx);border:1px solid var(--bd);border-radius:13px;font-weight:500}
.btn:active{transform:scale(.95);opacity:.9}
.btn:disabled{opacity:.5}
.compose{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:7px 7px 7px 18px}
.compose input{flex:1;min-width:0;border:none;background:none;color:var(--tx);font-size:16px;padding:11px 0;outline:none;font-family:inherit}
.compose input::placeholder{color:var(--mut)}
.cbtn{flex-shrink:0;width:42px;height:42px;border-radius:13px;border:none;background:var(--card2);color:var(--tx);font-size:17px;display:flex;align-items:center;justify-content:center;transition:transform .1s}
.cbtn:active{transform:scale(.9)}
.cbtn.send{background:var(--ac);color:#fff;font-weight:700}
.cbtn.listening{background:#dc2626;color:#fff;animation:micpulse 1.1s infinite}
.addlink{display:block;width:100%;text-align:center;margin:14px 0 2px;background:none;border:none;color:var(--mut);font-size:13.5px;font-weight:500;padding:6px}
.addlink:active{opacity:.55}
.bottomnav{position:fixed;left:0;right:0;bottom:0;z-index:30;display:flex;background:var(--bg);background:color-mix(in srgb,var(--bg) 82%,transparent);-webkit-backdrop-filter:blur(20px) saturate(var(--sat));backdrop-filter:blur(20px) saturate(var(--sat));border-top:1px solid color-mix(in srgb,var(--bd) 55%,transparent);padding-bottom:env(safe-area-inset-bottom,0px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:9px 0 7px;background:none;border:none;color:var(--mut);font-size:10.5px;font-weight:500;transition:color .15s}
.tab svg{width:24px;height:24px;display:block}
.tab.on{color:var(--ac)}
.tab:active{opacity:.55}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin:18px 0}
.metric{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:17px 16px}
.metric .n{font-size:29px;font-weight:700;line-height:1;letter-spacing:-.02em}
.metric .l{color:var(--mut);font-size:12.5px;margin-top:7px;font-weight:500}
.board{display:grid;grid-template-columns:1fr;gap:22px}
.col h4{font-size:12px;color:var(--mut);margin:0 0 11px;text-transform:uppercase;letter-spacing:.05em;font-weight:600}
.item{background:var(--card);border:1px solid var(--bd);border-radius:15px;padding:14px 15px;margin-bottom:10px;cursor:pointer;transition:transform .1s}
.item:active{transform:scale(.985)}
.item .t{font-size:15px;font-weight:500;line-height:1.35}
.item .m{font-size:11.5px;color:var(--mut);margin-top:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.tag{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:20px;font-weight:600}
.p-ulio{background:#1d3a6b;color:#93c5fd}.p-next{background:#0f3a2c;color:#6ee7b7}.p-personal{background:#33245e;color:#c4b5fd}.p-family{background:#4a3312;color:#fcd34d}.p-health{background:#3a1730;color:#f9a8d4}.p-platform{background:#1f2937;color:#9ca3af}.p-other{background:#242833;color:#9aa1ac}
[data-theme="light"] .p-ulio{background:#e6f0ff;color:#1d4ed8}[data-theme="light"] .p-next{background:#e7f8f0;color:#047857}[data-theme="light"] .p-personal{background:#f1ecfe;color:#6d28d9}[data-theme="light"] .p-family{background:#fef3e2;color:#b45309}[data-theme="light"] .p-health{background:#fde7f3;color:#be185d}[data-theme="light"] .p-platform{background:#eef0f2;color:#4b5563}[data-theme="light"] .p-other{background:#eef0f2;color:#4b5563}
.feed .item{margin-bottom:8px}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500}
.panel{background:var(--card);border:1px solid var(--bd);border-radius:18px;padding:18px;margin-bottom:14px}
.panel h3{margin:0 0 10px;font-size:16px;font-weight:600;letter-spacing:-.01em}
.sub{color:var(--mut);font-size:13.5px;line-height:1.5}
#login{min-height:100dvh;display:none;align-items:center;justify-content:center;padding:24px}
#login>div{background:var(--card);border:1px solid var(--bd);border-radius:22px;padding:30px 26px;max-width:360px;width:100%}
#pw{width:100%;padding:14px 15px;border:1px solid var(--bd);border-radius:13px;font-size:16px;margin-bottom:12px;font-family:inherit;background:var(--card2);color:var(--tx)}
#go{width:100%;padding:14px;font-size:15px}
#offline{display:none;background:#4a3312;color:#fcd34d;font-size:13px;padding:11px 14px;border-radius:12px;margin-bottom:14px}
[data-theme="light"] #offline{background:#fef3e2;color:#b45309}
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(3px);backdrop-filter:blur(3px)}
#modalCard{background:var(--card);width:100%;max-width:620px;max-height:90vh;overflow:auto;border-radius:24px 24px 0 0;padding:8px 20px calc(24px + env(safe-area-inset-bottom,0px))}
#modalCard::before{content:"";display:block;width:38px;height:4px;border-radius:3px;background:var(--bd);margin:6px auto 16px}
#modalCard h2{font-size:19px;margin:0 0 6px;line-height:1.3;font-weight:650}
.kv{font-size:12px;color:var(--mut);margin:2px 0}
.result{white-space:pre-wrap;font-size:13.5px;line-height:1.55;background:var(--card2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-top:10px}
.rawnote{font-size:12.5px;color:var(--mut);background:var(--card2);border-radius:8px;padding:8px 10px;margin-top:8px;font-style:italic}
.mact{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.field{margin-bottom:10px}
.field label{font-size:11px;color:var(--mut);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.field input,.field select,.field textarea{width:100%;padding:12px 12px;border:1px solid var(--bd);border-radius:11px;font-size:16px;font-family:inherit;background:var(--card2);color:var(--tx)}
.field textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
#toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);background:var(--tx);color:var(--bg);padding:11px 18px;border-radius:22px;font-size:13.5px;font-weight:500;opacity:0;transition:opacity .2s;z-index:60;pointer-events:none;max-width:88vw;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.25)}
#toast.on{opacity:1}
.chat{display:flex;flex-direction:column;gap:14px}
.livedot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#6ee7b7;margin-left:7px;box-shadow:0 0 0 rgba(110,231,183,.5);animation:pulse 2s infinite}
.livedot.off{background:#f87171;animation:none}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(110,231,183,.5)}70%{box-shadow:0 0 0 6px rgba(110,231,183,0)}100%{box-shadow:0 0 0 0 rgba(110,231,183,0)}}
.chatgroup{display:flex;flex-direction:column;gap:6px}
.bubblewrap{display:flex}
.bubblewrap.you{justify-content:flex-end}
.bubble{max-width:80%;padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.4}
.bubble.you{background:var(--ac);color:#fff;border-bottom-right-radius:4px}
.bubble.bot{background:var(--card);border:1px solid var(--bd);border-bottom-left-radius:4px}
.chattime{font-size:10.5px;color:var(--mut);text-align:right;margin-top:2px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chip{background:var(--card2);border:1px solid var(--bd);border-radius:20px;padding:4px 10px;font-size:11.5px;cursor:pointer;display:flex;align-items:center;gap:5px}
.empty{color:var(--mut);font-size:13px;padding:20px 0;text-align:center}
.daygroup{margin-bottom:16px}
.daygroup h4{font-size:12px;color:var(--mut);margin:0 0 8px;text-transform:uppercase;letter-spacing:.03em}
.evt{background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.evt .time{font-size:11.5px;color:var(--mut);min-width:64px;flex-shrink:0;padding-top:1px}
.evt .body{flex:1}
.evt .title{font-size:14px;font-weight:500}
.evt .loc{font-size:11.5px;color:var(--mut);margin-top:2px}
.evt .src{font-size:9.5px;color:var(--mut);border:1px solid var(--bd);border-radius:8px;padding:1px 6px;margin-left:6px}
.calhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.btn.icon.listening{background:#dc2626;color:#fff;border-color:#dc2626;animation:micpulse 1.1s infinite}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}70%{box-shadow:0 0 0 8px rgba(220,38,38,0)}100%{box-shadow:0 0 0 0 rgba(220,38,38,0)}}
.agentstrip{display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;margin:18px -18px 20px;padding:0 18px 2px;scroll-padding:18px}
.apill{flex-shrink:0;display:flex;align-items:center;gap:6px;font-size:11.5px;background:var(--card);border:1px solid var(--bd);border-radius:20px;padding:7px 13px;color:var(--mut);white-space:nowrap}
.apill .d{width:6px;height:6px;border-radius:50%;background:#10b981;flex-shrink:0}
.apill.busy{color:var(--tx);border-color:var(--ac)}
.apill.busy .d{background:#fcd34d;animation:pulse 1.4s infinite}
.pipeline{display:flex;flex-direction:column;gap:8px;margin-bottom:6px}
.pstage{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:11px 14px}
.pstage .pname{font-size:13.5px;font-weight:500;flex:1}
.pstage .pdesc{font-size:11.5px;color:var(--mut)}
.parrow{text-align:center;color:var(--mut);font-size:14px;margin:-2px 0}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.pdot.live{background:#10b981;box-shadow:0 0 0 3px rgba(16,185,129,.18)}
.pdot.manual{background:#f59e0b}
.pdot.off{background:#6b7280}
.pdot.cond{background:#818cf8;box-shadow:0 0 0 3px rgba(129,140,248,.18)}
.jobcard{display:flex;justify-content:space-between;align-items:center;background:var(--card2);border-radius:8px;padding:8px 12px;margin-bottom:6px;font-size:12px}
.jobcard .jname{font-weight:500}
.jobcard .jmeta{color:var(--mut);font-size:11px}
.acttl{display:flex;flex-direction:column;gap:8px}
.actrow{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;padding:8px 0;border-bottom:1px solid var(--bd)}
.actrow:last-child{border-bottom:none}
.acticon{width:22px;text-align:center;flex-shrink:0;font-size:13px}
.actbody .actt{color:var(--tx)}
.actbody .actm{color:var(--mut);font-size:10.5px;margin-top:2px}
@media(min-width:560px){.cards{grid-template-columns:repeat(4,1fr)}}
@media(min-width:640px){#modal{align-items:center}#modalCard{border-radius:22px;padding-bottom:24px}#modalCard::before{display:none}}
</style>
</head>
<body>

<div id="login"><div>
  <h1 style="font-size:25px;margin:0;font-weight:700;letter-spacing:-.02em">Town Square</h1>
  <div id="lgtitle" style="font-size:16px;font-weight:600;margin-top:18px"></div>
  <div id="lgsub" class="sub" style="margin:6px 0 18px"></div>
  <input id="pw" type="password" placeholder="Password"/>
  <button id="go" class="btn"></button>
  <div id="msg" style="color:#f87171;font-size:13px;margin-top:10px;min-height:16px"></div>
</div></div>

<div id="app" style="display:none">
  <header class="appbar">
    <div class="brand">
      <h1>Town Square<span id="livedot" class="livedot" style="display:none" title="Live — refreshing automatically"></span></h1>
      <div class="sub" id="cnt"></div>
    </div>
    <div class="hdrbtns">
      <button class="btn icon" id="pushbtn" title="Enable push notifications">🔔</button>
      <button class="btn icon" id="themebtn" title="Toggle theme">◐</button>
      <button class="btn sec" id="logout">Lock</button>
    </div>
  </header>
  <div class="wrap">
    <div id="offline">Can't reach the server right now — showing your last loaded data. Your login is still saved.</div>
    <div class="compose">
      <input id="cap" placeholder="Dump a thought, task, or idea…"/>
      <button class="cbtn" id="micgo" title="Voice input">🎤</button>
      <button class="cbtn send" id="capgo" title="Send">↑</button>
    </div>
    <button class="addlink" id="addgo">＋ Add a detailed task</button>
    <div id="agentstrip" class="agentstrip"></div>
    <div id="view"></div>
  </div>
  <nav class="bottomnav">
    <button class="tab on" data-tab="board"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="7" height="16" rx="1.6"/><rect x="14" y="4" width="7" height="10" rx="1.6"/></svg><span>Board</span></button>
    <button class="tab" data-tab="calendar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17M8 3.5v3.2M16 3.5v3.2"/></svg><span>Calendar</span></button>
    <button class="tab" data-tab="chat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 11.6a7.6 7.6 0 0 1-11 6.8L4 20l1.3-4.2A7.6 7.6 0 1 1 20.5 11.6Z"/></svg><span>Chat</span></button>
    <button class="tab" data-tab="mind"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.2l1.7 4.6L18.3 9.5l-4.6 1.7L12 15.8l-1.7-4.6L5.7 9.5l4.6-1.7L12 3.2Z"/><path d="M18.2 14.2l.8 2.3 2.3.8-2.3.8-.8 2.3-.8-2.3-2.3-.8 2.3-.8.8-2.3Z"/></svg><span>Mind</span></button>
    <button class="tab" data-tab="feedback"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.2 18h5.6M10.2 21h3.6M12 3a6 6 0 0 0-3.6 10.8c.6.5 1 1.2 1.1 2h5c.1-.8.5-1.5 1.1-2A6 6 0 0 0 12 3Z"/></svg><span>Feedback</span></button>
  </nav>
</div>

<div id="modal"><div id="modalCard"></div></div>
<div id="toast"></div>

<script>
var FN="https://enrybarwjcqpibiqactn.supabase.co/functions/v1";
var VAPID_PUBLIC_KEY="BNbOQylhDKfRbN8YGRzA3vcJIt61wTGt6tZHTMcImX1lNHatT92UYE7gpmPUTQy-C1sZlao1BbkW-fhqSTnZPMo";
var DATA=[];var TAB="board";var MODE="login";var chart1=null,chart2=null;
var PROJECTS=["Ulio","Next venture","Personal","Family","Health","Platform","Other"];
function el(i){return document.getElementById(i)}
function tok(){return localStorage.getItem("ts_token")}
function show(v){el("login").style.display=v==="login"?"flex":"none";el("app").style.display=v==="app"?"block":"none"}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function toast(m){var t=el("toast");t.textContent=m;t.classList.add("on");setTimeout(function(){t.classList.remove("on")},2400)}
function pcls(p){var m={"Ulio":"p-ulio","Next venture":"p-next","Personal":"p-personal","Family":"p-family","Health":"p-health","Platform":"p-platform"};return m[p]||"p-other"}
var OPENS=["captured","triaged","agent_working","needs_you","browser_queued","browser_working","awaiting_approval","approved"];
function isOpen(r){return OPENS.indexOf(r.status)>=0}
function statusInfo(s){var m={captured:["New","#9aa1ac","#242833"],triaged:["To do","#93c5fd","#1d3a6b"],agent_working:["Working","#fcd34d","#4a3312"],needs_you:["Review","#6ee7b7","#0f3a2c"],done:["Done","#9aa1ac","#242833"],browser_queued:["Queued (browser)","#93c5fd","#1d3a6b"],browser_working:["Browser working","#fcd34d","#4a3312"],awaiting_approval:["Needs your OK","#fca5a5","#4a1d1d"],approved:["Approved — pending","#6ee7b7","#0f3a2c"]};return m[s]||["",""]}
function badge(s){var b=statusInfo(s);return "<span class=badge style='background:"+b[2]+";color:"+b[1]+"'>"+b[0]+"</span>"}
function tag(p){return "<span class='tag "+pcls(p)+"'>"+esc(p||"Other")+"</span>"}

// ---- theme ----
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);el("themebtn").textContent=t==="dark"?"◐":"◑"}
(function(){var t=localStorage.getItem("ts_theme")||"dark";document.documentElement.setAttribute("data-theme",t)})();

// ---- auth / data (robust: only a real 401 clears the saved login) ----
function authHeaders(){return {authorization:"Bearer "+tok(),"content-type":"application/json"}}
async function postAct(action,extra){
  var body=Object.assign({action:action},extra||{});
  try{var r=await fetch(FN+"/act",{method:"POST",headers:authHeaders(),body:JSON.stringify(body)});return await r.json().catch(function(){return {}})}
  catch(e){return {error:"offline"}}
}
async function changeSetting(key,value,ctrl){
  if(ctrl)ctrl.disabled=true;
  var res=await postAct("updateSetting",{key:key,value:value});
  if(ctrl)ctrl.disabled=false;
  if(res&&res.error){alert("Couldn't change that: "+res.error);}
  await fetchSystem();
  if(TAB==="mind")paintMind(SYS);
}
var NOTES=[];var BOOKS=[];
async function fetchData(){
  var t=tok();if(!t)return false;
  var r;
  try{r=await fetch(FN+"/data",{headers:{authorization:"Bearer "+t}})}
  catch(e){el("offline").style.display="block";return "offline"}
  if(r.status===401){localStorage.removeItem("ts_token");return false}
  if(!r.ok){el("offline").style.display="block";return "offline"}
  el("offline").style.display="none";
  var payload=await r.json();
  DATA=payload.items||[];
  NOTES=payload.notes||[];
  BOOKS=payload.books||[];
  el("cnt").textContent="your chief of staff · "+DATA.length+" items · "+NOTES.length+" notes";
  renderCurrent();
  return true;

  if(Array.isArray(r.context_log)&&r.context_log.length){h+="<div class=kv style='margin-top:12px;font-weight:500'>Context learned since:</div>"+r.context_log.map(function(c){return "<div class=rawnote>"+esc(c.text)+"</div>";}).join("");}
  if(r.result)h+="<div class=result>"+esc(r.result)+"</div>";
  h+="<div id=editwrap></div><div class=mact id=mact></div>";
  el("modalCard").innerHTML=h;

  else{
    if(r.agent_doable)btns+="<button class=btn id=dispbtn onclick=\"doDispatch('"+r.id+"')\">"+(r.result?"Re-run agent":"Dispatch agent")+"</button>";

}

// ---- voice input (records real audio, transcribes server-side via Groq Whisper — same engine Telegram voice notes use) ----
var activeRecorder=null;
function pickMimeType(){
  var cands=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/ogg;codecs=opus"];
  for(var i=0;i<cands.length;i++){if(window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(cands[i]))return cands[i]}
  return "";
}
async function startVoice(targetId,btn){
  if(activeRecorder){try{activeRecorder.stop()}catch(e){}return}
  if(!navigator.mediaDevices||!window.MediaRecorder){toast("Voice input isn't supported in this browser — try Chrome or Safari, or just type.");return}
  var stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:true})}
  catch(e){toast("Microphone access denied — check Settings > Town Square > Microphone.");return}
  var mimeType=pickMimeType();
  var rec;
  try{rec=mimeType?new MediaRecorder(stream,{mimeType:mimeType}):new MediaRecorder(stream)}
  catch(e){stream.getTracks().forEach(function(t){t.stop()});toast("Couldn't start recording.");return}
  var chunks=[];
  rec.ondataavailable=function(e){if(e.data&&e.data.size>0)chunks.push(e.data)};
  var maxTimer=setTimeout(function(){if(activeRecorder===rec){try{rec.stop()}catch(e){}}},90000);
  rec.onstop=async function(){
    clearTimeout(maxTimer);
    activeRecorder=null;
    stream.getTracks().forEach(function(t){t.stop()});
    btn.classList.remove("listening");btn.textContent="🎤";
    var blob=new Blob(chunks,{type:rec.mimeType||mimeType||"audio/webm"});
    if(blob.size<400)return; // essentially silent/instant tap — nothing to send
    btn.disabled=true;
    var ext=(rec.mimeType||"").indexOf("mp4")>=0?"m4a":(rec.mimeType||"").indexOf("ogg")>=0?"ogg":"webm";
    var fd=new FormData();fd.append("audio",blob,"voice."+ext);
    try{
      var r=await fetch(FN+"/transcribe",{method:"POST",headers:{authorization:"Bearer "+tok()},body:fd});
      var d=await r.json().catch(function(){return {}});
      if(d.text)el(targetId).value=d.text;else toast(d.error||"Couldn't transcribe that — try again.");
    }catch(e){toast("Couldn't reach transcription — check your connection.")}
    btn.disabled=false;
  };
  rec.start();
  activeRecorder=rec;
  btn.classList.add("listening");btn.textContent="⏹";
}

async function post(action,password){
  try{var r=await fetch(FN+"/auth",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({action:action,password:password})});var d=await r.json().catch(function(){return {}});return {ok:r.ok,data:d}}
  catch(e){return {ok:false,data:{error:"Can't reach the server. Check your connection."}}}
}
async function submit(){var pw=el("pw").value;if(pw.length<4){el("msg").textContent="At least 4 characters";return}el("msg").textContent="working…";var res=await post(MODE,pw);if(res.ok&&res.data.token){localStorage.setItem("ts_token",res.data.token);el("msg").textContent="";show("app");applyTheme(localStorage.getItem("ts_theme")||"dark");await fetchData();startLive();await trySilentPushResubscribe()}else{el("msg").textContent=res.data.error||"Failed"}}
function urlBase64ToUint8Array(base64String){
  var padding="=".repeat((4-base64String.length%4)%4);
  var base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  var raw=atob(base64);var out=new Uint8Array(raw.length);
  for(var i=0;i<raw.length;i++)out[i]=raw.charCodeAt(i);
  return out;
}
async function updatePushButtonState(){
  var btn=el("pushbtn");if(!btn)return;
  if(!("serviceWorker" in navigator)||!("PushManager" in window)){btn.style.display="none";return}
  try{
    var reg=await navigator.serviceWorker.getRegistration();
    var sub=reg?await reg.pushManager.getSubscription():null;
    btn.textContent=sub?"🔔":"🔕";
    btn.title=sub?"Notifications on — click to disable":"Enable push notifications";
  }catch(e){}
}
async function enablePush(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)){toast("Push isn't supported on this browser");return}
  try{
    var reg=await navigator.serviceWorker.register("./sw.js");
    var existing=await reg.pushManager.getSubscription();
    if(existing){
      await postAct("pushUnsubscribe",{endpoint:existing.endpoint});
      await existing.unsubscribe();
      toast("Notifications disabled");
      await updatePushButtonState();
      return;
    }
    var perm=await Notification.requestPermission();
    if(perm!=="granted"){toast("Notifications blocked in browser settings");return}
    var sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlBase64ToUint8Array(VAPID_PUBLIC_KEY)});
    await postAct("pushSubscribe",{subscription:sub.toJSON()});
    toast("Notifications enabled");
    await updatePushButtonState();
  }catch(e){toast("Couldn't enable notifications")}
}
async function trySilentPushResubscribe(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window))return;
  if(Notification.permission!=="granted")return;
  try{
    var reg=await navigator.serviceWorker.register("./sw.js");
    var sub=await reg.pushManager.getSubscription();
    if(sub)await postAct("pushSubscribe",{subscription:sub.toJSON()});
    await updatePushButtonState();
  }catch(e){}
}
async function handleDeepLinks(){
  var params=new URLSearchParams(location.search);
  var approve=params.get("approve"),cancel=params.get("cancel"),item=params.get("item");
  if(approve){await postAct("approveItem",{id:approve});await fetchData();toast("Approved");}
  else if(cancel){await postAct("cancelItem",{id:cancel});await fetchData();toast("Cancelled");}
  if(approve||cancel||item){
    history.replaceState({},"",location.pathname);
  }
  if(item)openDetail(item);
}
var LIVE_TIMER=null;
function startLive(){
  el("livedot").style.display="inline-block";
  fetchSystem();
  fetchDailyPlan().then(function(){if(TAB==="board")renderBoard()});
  if(LIVE_TIMER)return;
  LIVE_TIMER=setInterval(async function(){
    if(document.hidden)return;
    var res=await fetchData();
    el("livedot").classList.toggle("off",res==="offline");
    fetchSystem();
    fetchDailyPlan().then(function(){if(TAB==="board")renderBoard()});
  },6000);
}
async function boot(){
  applyTheme(localStorage.getItem("ts_theme")||"dark");
  if(tok()){
    show("app");
    var res=await fetchData();
    if(res===false){ // real 401 — token was invalid/expired, need fresh login
      var s=await post("status","");
      MODE="login";
      el("lgtitle").textContent="Session expired";
      el("lgsub").textContent="Enter your password to unlock again.";
      el("go").textContent="Unlock";
      show("login");
      return;
    }
    startLive();
    await handleDeepLinks();
    await trySilentPushResubscribe();
    return;
  }
  var s=await post("status","");
  MODE=(s.data&&s.data.configured)?"login":"setup";
  el("lgtitle").textContent=MODE==="setup"?"Create a password":"Welcome back";
  el("lgsub").textContent=MODE==="setup"?"Set a password to lock your Town Square. You only enter it once on this device — it's remembered from then on.":"Enter your password to unlock.";
  el("go").textContent=MODE==="setup"?"Create and open":"Unlock";
  show("login");
}
el("go").addEventListener("click",submit);
el("pw").addEventListener("keydown",function(e){if(e.key==="Enter")submit()});
boot();
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js").catch(function(){})}
