<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width, initial-scale=1, viewport-fit=cover'><meta name='apple-mobile-web-app-capable' content='yes'><meta name='apple-mobile-web-app-status-bar-style' content='default'><meta name='apple-mobile-web-app-title' content='Town Square'><meta name='theme-color' content='#6366f1'><link rel='manifest' href='./manifest.json'><link rel='apple-touch-icon' href='./icon.svg'><title>Town Square</title><script src='https://cdn.jsdelivr.net/npm/chart.js@4'></script><style>:root{--bg:#f6f7f9;--card:#fff;--bd:#e6e8eb;--tx:#1a1d21;--mut:#6b7280;--ac:#6366f1}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--tx)}.wrap{max-width:1100px;margin:0 auto;padding:24px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px}.top h1{font-size:22px;margin:0}.sub{color:var(--mut);font-size:13px}button{background:var(--ac);color:#fff;border:0;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.metric{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px}.metric .n{font-size:28px;font-weight:600;line-height:1}.metric .l{color:var(--mut);font-size:13px;margin-top:6px}.charts{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}.panel{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px}.panel h3{margin:0 0 8px;font-size:14px;font-weight:600}.board{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.col h4{font-size:13px;color:var(--mut);margin:0 0 8px}.item{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:8px}.item .t{font-size:14px;font-weight:500}.item .m{font-size:11px;color:var(--mut);margin-top:5px}.item .pl{font-size:11px;color:var(--mut);margin-top:6px;line-height:1.4}.p-ulio,.p-next,.p-personal,.p-family,.p-other{display:inline-block;font-size:10px;padding:1px 8px;border-radius:20px;margin-right:5px}.p-ulio{background:#e6f0ff;color:#1d4ed8}.p-next{background:#e7f8f0;color:#047857}.p-personal{background:#f1ecfe;color:#6d28d9}.p-family{background:#fef3e2;color:#b45309}.p-other{background:#eef0f2;color:#4b5563}#login{min-height:100vh;align-items:center;justify-content:center;padding:24px}#login>div{background:#fff;border:1px solid var(--bd);border-radius:16px;padding:28px;max-width:340px;width:100%}#pw{width:100%;padding:11px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:15px;margin-bottom:10px;font-family:inherit}#go{width:100%;padding:11px;font-size:14px}@media(max-width:820px){.cards{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr}.board{grid-template-columns:1fr}}</style></head><body><div id='login' style='display:none'><div><h1 style='font-size:20px;margin:0'>Town Square</h1><div id='lgtitle' style='font-size:15px;font-weight:600;margin-top:14px'></div><div id='lgsub' class='sub' style='margin:4px 0 14px'></div><input id='pw' type='password' placeholder='Password'/><button id='go'></button><div id='msg' style='color:#dc2626;font-size:12px;margin-top:8px;min-height:14px'></div></div></div><div id='app' style='display:none'><div class='wrap'><div class='top'><div><h1>Town Square</h1><div class='sub'>your chief of staff &middot; <span id='cnt'></span></div></div><div><button onclick='location.reload()'>Refresh</button> <button id='logout' style='background:#eef0f2;color:#374151'>Lock</button></div></div><div class='cards' id='cards'></div><div class='charts'><div class='panel'><h3>Who acts on it</h3><canvas id='c1' height='170'></canvas></div><div class='panel'><h3>By project</h3><canvas id='c2' height='170'></canvas></div></div><div class='board' id='board'></div></div></div><script>var FN='https://enrybarwjcqpibiqactn.supabase.co/functions/v1';function el(i){return document.getElementById(i)}function show(v){el('login').style.display=v==='login'?'flex':'none';el('app').style.display=v==='app'?'block':'none'}function setMsg(m){el('msg').textContent=m||''}function render(DATA){var OPENS=['captured','triaged','agent_working','needs_you'];var open=DATA.filter(function(r){return OPENS.indexOf(r.status)>=0});var agentCan=open.filter(function(r){return r.agent_doable});var yours=open.filter(function(r){return !r.agent_doable});var now=new Date();var soon=open.filter(function(r){if(!r.due_date)return false;var d=new Date(r.due_date);return (d-now)<=7*864e5&&(d-now)>=-40*864e5});var cards=[['Open items',open.length],['Agent can handle',agentCan.length],['Your calls',yours.length],['Due within 7 days',soon.length]];el('cards').innerHTML=cards.map(function(c){return '<div class=metric><div class=n>'+c[1]+'</div><div class=l>'+c[0]+'</div></div>'}).join('');el('cnt').textContent=DATA.length+' items tracked';function pcls(p){return p==='Ulio'?'p-ulio':p==='Next venture'?'p-next':p==='Personal'?'p-personal':p==='Family'?'p-family':'p-other'}function esc(s){return String(s==null?'':s).replace(/</g,'&lt;').replace(/>/g,'&gt;')}function itemHtml(r){var tag='<span class='+pcls(r.project)+'>'+esc(r.project)+'</span>';var due=r.due_date?' &middot; due '+String(r.due_date).slice(0,10):'';var pl=r.agent_plan?'<div class=pl>'+(r.agent_doable?'[agent] ':'[you] ')+esc(r.agent_plan)+'</div>':'';return '<div class=item><div class=t>'+esc(r.title)+'</div><div class=m>'+tag+esc(r.type)+' &middot; '+esc(r.stakes)+due+'</div>'+pl+'</div>'}var lanes=[['New',open.filter(function(r){return r.status==='captured'})],['Agent can handle',agentCan.filter(function(r){return r.status!=='captured'})],['Your calls',yours.filter(function(r){return r.status!=='captured'})]];el('board').innerHTML=lanes.map(function(l){return '<div class=col><h4>'+l[0]+' ('+l[1].length+')</h4>'+(l[1].length?l[1].map(itemHtml).join(''):'<div class=sub>none</div>')+'</div>'}).join('');new Chart(el('c1'),{type:'doughnut',data:{labels:['Agent can handle','Your calls'],datasets:[{data:[agentCan.length,yours.length],backgroundColor:['#10b981','#8b5cf6'],borderWidth:0}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});var PC={Ulio:'#3b82f6','Next venture':'#10b981',Personal:'#8b5cf6',Family:'#f59e0b',Other:'#6b7280'};var projs=Object.keys(PC).filter(function(p){return open.some(function(r){return r.project===p})});new Chart(el('c2'),{type:'bar',data:{labels:projs,datasets:[{data:projs.map(function(p){return open.filter(function(r){return r.project===p}).length}),backgroundColor:projs.map(function(p){return PC[p]}),borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}})}async function post(action,password){var r=await fetch(FN+'/auth',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({action:action,password:password})});var d=await r.json().catch(function(){return {}});return {ok:r.ok,data:d}}async function loadData(){var tk=localStorage.getItem('ts_token');if(!tk)return false;var r=await fetch(FN+'/data',{headers:{authorization:'Bearer '+tk}});if(r.status===401){localStorage.removeItem('ts_token');return false}var data=await r.json();show('app');render(data);return true}var MODE='login';async function submit(){var pw=el('pw').value;if(pw.length<4){setMsg('At least 4 characters');return}setMsg('working...');var res=await post(MODE,pw);if(res.ok&&res.data.token){localStorage.setItem('ts_token',res.data.token);setMsg('');await loadData()}else{setMsg(res.data.error||'Failed')}}async function boot(){if(await loadData())return;var s=await post('status','');MODE=(s.data&&s.data.configured)?'login':'setup';el('lgtitle').textContent=MODE==='setup'?'Create a password':'Welcome back';el('lgsub').textContent=MODE==='setup'?'Set a password to lock your Town Square. You only enter it once on this device.':'Enter your password to unlock.';el('go').textContent=MODE==='setup'?'Create and open':'Unlock';show('login')}el('go').addEventListener('click',submit);el('pw').addEventListener('keydown',function(e){if(e.key==='Enter')submit()});el('logout').addEventListener('click',function(){localStorage.removeItem('ts_token');location.reload()});boot();if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(function(){})}</script></body></html>
